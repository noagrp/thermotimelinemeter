<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThermoTimelineMeter</title>
    <style>
        /* --- Themes Configurations --- */
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent-color: #ff4757;
            --line-color: #333333;
            --border-color: #444444;
        }

        [data-theme="very-black"] {
            --bg-color: #000000;
            --card-bg: #0a0a0a;
            --text-color: #ffffff;
            --accent-color: #ffffff;
            --line-color: #ffffff;
            --border-color: #ffffff;
        }

        [data-theme="white"] {
            --bg-color: #ffffff;
            --card-bg: #f5f5f5;
            --text-color: #000000;
            --accent-color: #000000;
            --line-color: #000000;
            --border-color: #000000;
        }

        [data-theme="soft-rainbow"] {
            --bg-color: linear-gradient(135deg, #ffe5ec, #ffebf0, #f0e6ff, #e8f0fe, #e6fffa);
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-color: #2f3542;
            --accent-color: #ff4757;
            --line-color: #747d8c;
            --border-color: #ced6e0;
            --vivid-text: #ff1100; /* Solid vivid color overrides for text inside cards */
        }

        /* --- Global Styles --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background 0.3s, color 0.3s;
        }

        body {
            background: var(--bg-color);
            background-attachment: fixed;
            color: var(--text-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            max-width: 800px;
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 2.5rem;
        }

        /* --- Controls & Forms --- */
        .controls-panel {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 12px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .theme-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        button, label.btn-label {
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-color);
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
        }

        button:hover, label.btn-label:hover {
            background: var(--text-color);
            color: var(--bg-color);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input, textarea {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-color);
            width: 100%;
        }

        .io-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed var(--border-color);
        }

        /* --- Thermometer Timeline Structure --- */
        .timeline-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 0;
        }

        /* The main center mercury tube */
        .timeline-container::after {
            content: '';
            position: absolute;
            width: 8px;
            background: var(--line-color);
            top: 0;
            bottom: 0;
            left: 50%;
            margin-left: -4px;
            border-radius: 4px;
            z-index: 1;
        }

        .timeline-item {
            padding: 10px 40px;
            position: relative;
            background-color: inherit;
            width: 50%;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        /* The node bulb on the thermometer */
        .timeline-item::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            right: -10px;
            background-color: var(--card-bg);
            border: 4px solid var(--accent-color);
            top: 15px;
            border-radius: 50%;
            z-index: 2;
        }

        /* Left and Right Item placement */
        .left {
            left: 0;
            text-align: right;
        }

        .right {
            left: 50%;
            text-align: left;
        }

        .right::after {
            left: -10px;
        }

        /* Story Card Styling */
        .timeline-content {
            padding: 20px;
            background: var(--card-bg);
            position: relative;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        [data-theme="soft-rainbow"] .timeline-content h3 {
            color: var(--vivid-text);
        }
        [data-theme="soft-rainbow"] .timeline-content p {
            color: #000000;
            font-weight: 600;
        }

        .date-badge {
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 1px;
            color: var(--accent-color);
            margin-bottom: 8px;
            display: block;
        }

        .story-text {
            margin-top: 5px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .delete-btn {
            background: transparent;
            border: none;
            color: #ff4757;
            cursor: pointer;
            font-size: 0.8rem;
            margin-top: 10px;
            text-decoration: underline;
        }
        .delete-btn:hover {
            background: transparent;
            color: red;
        }

        /* Responsive Fix for Small Screens */
        @media screen and (max-width: 600px) {
            .timeline-container::after {
                left: 31px;
            }
            .timeline-item {
                width: 100%;
                padding-left: 70px;
                padding-right: 25px;
                text-align: left;
            }
            .timeline-item::after {
                left: 21px;
                right: auto;
            }
            .right {
                left: 0%;
            }
        }
    </style>
</head>
<body data-theme="very-black">

    <header>
        <h1>ThermoTimelineMeter</h1>
        <div class="theme-selector">
            <button onclick="setTheme('very-black')">Very Black</button>
            <button onclick="setTheme('white')">White Theme</button>
            <button onclick="setTheme('soft-rainbow')">Soft Rainbow</button>
        </div>
    </header>

    <!-- Control Panel to Add Records -->
    <div class="controls-panel">
        <form id="storyForm" onsubmit="addStory(event)">
            <div class="input-group">
                <label for="storyDate">Event Date</label>
                <input type="date" id="storyDate" required>
                
                <label for="storyTitle">What Happened? (Title)</label>
                <input type="text" id="storyTitle" placeholder="e.g., First Met" required>
                
                <label for="storyDesc">The Details / Story</label>
                <textarea id="storyDesc" rows="3" placeholder="At the coffee shop, we talked for hours..." required></textarea>
                
                <button type="submit" style="margin-top: 10px;">Record into Thermometer</button>
            </div>
        </form>

        <!-- Import / Export Actions -->
        <div class="io-buttons">
            <button onclick="exportData()">📤 Export Data (Backup)</button>
            <label class="btn-label" for="importFile">📥 Import Data</label>
            <input type="file" id="importFile" accept=".json" onchange="importData(event)" style="display: none;">
        </div>
    </div>

    <!-- The Left-Right Thermometer Timeline Canvas -->
    <div class="timeline-container" id="timeline">
        <!-- Rendered items go here -->
    </div>

    <script>
        // Array to store data objects: { date: 'YYYY-MM-DD', title: '', desc: '' }
        let stories = [];

        // Load data from LocalStorage when the app starts
        window.onload = function() {
            const storedStories = localStorage.getItem('thermometer_stories');
            const storedTheme = localStorage.getItem('thermometer_theme');
            
            if (storedStories) {
                stories = JSON.parse(storedStories);
                sortAndRender();
            }
            if (storedTheme) {
                setTheme(storedTheme);
            }
        }

        // Change Theme Matrix
        function setTheme(themeName) {
            document.body.setAttribute('data-theme', themeName);
            localStorage.setItem('thermometer_theme', themeName);
        }

        // Format Date to Display Structure DD/MM/YYYY
        function formatDate(dateString) {
            const [year, month, day] = dateString.split('-');
            return `${day}/${month}/${year}`;
        }

        // Add New Entry
        function addStory(event) {
            event.preventDefault();
            
            const date = document.getElementById('storyDate').value;
            const title = document.getElementById('storyTitle').value;
            const desc = document.getElementById('storyDesc').value;

            stories.push({ id: Date.now(), date, title, desc });
            
            // Clear fields
            document.getElementById('storyForm').reset();
            
            saveAndRender();
        }

        // Delete Entry
        function deleteStory(id) {
            if(confirm("Are you sure you want to delete this memory?")) {
                stories = stories.filter(story => story.id !== id);
                saveAndRender();
            }
        }

        // Synchronize and Redraw
        function saveAndRender() {
            localStorage.setItem('thermometer_stories', JSON.stringify(stories));
            sortAndRender();
        }

        // Sort items Chronologically and Draw dynamic alternating elements
        function sortAndRender() {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = '';

            // Sort dates oldest to newest up the thermometer (or swap a - b to reverse)
            stories.sort((a, b) => new Date(a.date) - new Date(b.date));

            stories.forEach((story, index) => {
                const itemDiv = document.createElement('div');
                // Alternates side class: left vs right
                const sideClass = (index % 2 === 0) ? 'left' : 'right';
                itemDiv.className = `timeline-item ${sideClass}`;

                itemDiv.innerHTML = `
                    <div class="timeline-content">
                        <span class="date-badge">${formatDate(story.date)}</span>
                        <h3>${escapeHtml(story.title)}</h3>
                        <p class="story-text">${escapeHtml(story.desc)}</p>
                        <button class="delete-btn" onclick="deleteStory(${story.id})">Remove</button>
                    </div>
                `;
                timeline.appendChild(itemDiv);
            });
        }

        // Prevent XSS Injection safely
        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        /* --- Export System (JSON) --- */
        function exportData() {
            if(stories.length === 0) {
                alert("No memory data to export yet!");
                return;
            }
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(stories, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", "thermometer_stories_backup.json");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        /* --- Import System (JSON) --- */
        function importData(event) {
            const fileReader = new FileReader();
            fileReader.onload = function(e) {
                try {
                    const importedStories = JSON.parse(e.target.result);
                    if (Array.isArray(importedStories)) {
                        stories = importedStories;
                        saveAndRender();
                        alert("Data successfully imported!");
                    } else {
                        alert("Invalid file structure format.");
                    }
                } catch (err) {
                    alert("Error parsing file. Please use a genuine backup file.");
                }
            };
            fileReader.readAsText(event.target.files[0]);
        }
    </script>
</body>
</html>
